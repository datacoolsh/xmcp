services:
  xmcp:
    build: .
    ports:
      - "8009:8000"
    env_file:
      - .env
    environment:
      # Override to listen on all interfaces inside the container
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8009"
    # OAuth1 callback server port (only needed if running interactive OAuth1 flow)
    # ports:
    #   - "8976:8976"
    restart: unless-stopped
